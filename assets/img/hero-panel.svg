<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Cuadro eléctrico con magnetotérmicos siendo revisado por un electricista">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#143a63"/>
      <stop offset="1" stop-color="#0a1e38"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3f6fa"/>
      <stop offset="1" stop-color="#d7dfe8"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5b400"/>
      <stop offset="1" stop-color="#e0a300"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f5b400" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f5b400" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- backdrop -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="250" cy="210" r="170" fill="url(#glow)"/>

  <!-- wires entering from below -->
  <g fill="none" stroke-width="9" stroke-linecap="round">
    <path d="M300 600 C300 480 230 470 250 360" stroke="#e23b3b"/>
    <path d="M360 600 C360 500 430 470 420 360" stroke="#2f6fe0"/>
    <path d="M420 600 C420 470 360 470 330 360" stroke="#21a35a"/>
    <path d="M480 600 C480 510 520 470 500 360" stroke="#8a5a2b"/>
  </g>

  <!-- enclosure -->
  <rect x="150" y="80" width="520" height="430" rx="22" fill="url(#metal)" stroke="#b9c4d0" stroke-width="3"/>
  <rect x="178" y="110" width="464" height="370" rx="12" fill="#c8d3df"/>

  <!-- DIN rails -->
  <rect x="196" y="150" width="430" height="118" rx="6" fill="#aeb9c6"/>
  <rect x="196" y="300" width="430" height="118" rx="6" fill="#aeb9c6"/>

  <!-- breaker rows -->
  <g>
    <!-- row 1 -->
    <g>
      <g transform="translate(206,158)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="12" width="18" height="22" rx="3" fill="#2f6fe0"/><rect x="11" y="58" width="12" height="6" rx="2" fill="#c2ccd6"/></g>
      <g transform="translate(246,158)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="12" width="18" height="22" rx="3" fill="#2f6fe0"/><rect x="11" y="58" width="12" height="6" rx="2" fill="#c2ccd6"/></g>
      <g transform="translate(286,158)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="44" width="18" height="22" rx="3" fill="#e23b3b"/><rect x="11" y="20" width="12" height="6" rx="2" fill="#c2ccd6"/></g>
      <g transform="translate(326,158)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="12" width="18" height="22" rx="3" fill="#2f6fe0"/><rect x="11" y="58" width="12" height="6" rx="2" fill="#c2ccd6"/></g>
      <g transform="translate(366,158)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="12" width="18" height="22" rx="3" fill="#21a35a"/><rect x="11" y="58" width="12" height="6" rx="2" fill="#c2ccd6"/></g>
      <g transform="translate(406,158)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="12" width="18" height="22" rx="3" fill="#2f6fe0"/><rect x="11" y="58" width="12" height="6" rx="2" fill="#c2ccd6"/></g>
      <g transform="translate(446,158)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="44" width="18" height="22" rx="3" fill="#e23b3b"/><rect x="11" y="20" width="12" height="6" rx="2" fill="#c2ccd6"/></g>
      <g transform="translate(486,158)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="12" width="18" height="22" rx="3" fill="#2f6fe0"/><rect x="11" y="58" width="12" height="6" rx="2" fill="#c2ccd6"/></g>
      <g transform="translate(526,158)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="12" width="18" height="22" rx="3" fill="#2f6fe0"/><rect x="11" y="58" width="12" height="6" rx="2" fill="#c2ccd6"/></g>
      <g transform="translate(566,158)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="44" width="18" height="22" rx="3" fill="#e23b3b"/><rect x="11" y="20" width="12" height="6" rx="2" fill="#c2ccd6"/></g>
    </g>
    <!-- row 2 -->
    <g>
      <g transform="translate(206,308)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="12" width="18" height="22" rx="3" fill="#2f6fe0"/></g>
      <g transform="translate(246,308)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="44" width="18" height="22" rx="3" fill="#e23b3b"/></g>
      <g transform="translate(286,308)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="12" width="18" height="22" rx="3" fill="#2f6fe0"/></g>
      <g transform="translate(326,308)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="12" width="18" height="22" rx="3" fill="#21a35a"/></g>
      <g transform="translate(366,308)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="12" width="18" height="22" rx="3" fill="#2f6fe0"/></g>
      <g transform="translate(406,308)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="44" width="18" height="22" rx="3" fill="#e23b3b"/></g>
      <g transform="translate(446,308)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="12" width="18" height="22" rx="3" fill="#2f6fe0"/></g>
      <g transform="translate(486,308)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="12" width="18" height="22" rx="3" fill="#2f6fe0"/></g>
      <g transform="translate(526,308)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="44" width="18" height="22" rx="3" fill="#e23b3b"/></g>
      <g transform="translate(566,308)"><rect width="34" height="102" rx="4" fill="#fbfdff" stroke="#9fb0c1" stroke-width="2"/><rect x="8" y="12" width="18" height="22" rx="3" fill="#21a35a"/></g>
    </g>
  </g>

  <!-- highlight on the breaker being checked -->
  <circle cx="303" cy="210" r="54" fill="url(#glow)"/>

  <!-- screwdriver -->
  <g transform="rotate(38 360 250)">
    <rect x="330" y="120" width="26" height="90" rx="12" fill="url(#handle)"/>
    <rect x="338" y="205" width="10" height="70" rx="3" fill="#cfd8e2"/>
    <rect x="339" y="272" width="8" height="20" fill="#9fb0c1"/>
  </g>

  <!-- spark -->
  <g stroke="#f5b400" stroke-width="4" stroke-linecap="round">
    <path d="M306 150 l-14 -22"/>
    <path d="M330 158 l10 -20"/>
    <path d="M286 168 l-22 -6"/>
  </g>
</svg>
